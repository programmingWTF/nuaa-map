# 自动标签规则 — actions/labeler@v5 配置
# PR 修改了哪些文件就自动打对应的小组标签

小组：①手绘地图:
  - changed-files:
      - any-glob-to-any-file:
          - "frontend/public/**"
          - "assets/map/**"
          - "frontend/src/components/MapView/**"
          - "frontend/src/components/Minimap/**"

小组：②交互功能:
  - changed-files:
      - any-glob-to-any-file:
          - "frontend/src/components/**"
          - "frontend/src/hooks/**"
          - "!frontend/src/components/MapView/**"
          - "!frontend/src/components/Minimap/**"

小组：③平台搭建:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "scripts/**"
          - "Dockerfile"
          - "docker-compose*.yml"
          - "frontend/package.json"
          - "frontend/vite.config.*"

小组：④数据采集:
  - changed-files:
      - any-glob-to-any-file:
          - "data/qa/**"
          - "data/raw/**"

小组：⑤AI智能体:
  - changed-files:
      - any-glob-to-any-file:
          - "ai-agent/**"
          - "backend/**"

小组：⑥坐标标注:
  - changed-files:
      - any-glob-to-any-file:
          - "data/positions/**"
          - "data/extracted-map/**"
          - "frontend/src/data/**"

类型：文档:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"
