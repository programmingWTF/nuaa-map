name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 192.168.0.150
          username: LiGuiyu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /vol1/1000/Docker/NUAAMap
            git pull origin main
            docker compose up -d --build
