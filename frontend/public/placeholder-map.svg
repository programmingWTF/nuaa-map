<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="sketch">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <pattern id="grass" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#E6EDE0"/>
      <circle cx="10" cy="15" r="1.5" fill="#C8D8BE" opacity="0.6"/>
      <circle cx="28" cy="32" r="1" fill="#B8CCAA" opacity="0.5"/>
      <circle cx="35" cy="8" r="1.2" fill="#C8D8BE" opacity="0.4"/>
    </pattern>
    <pattern id="water" width="60" height="20" patternUnits="userSpaceOnUse">
      <rect width="60" height="20" fill="#D4E2ED"/>
      <path d="M0 10 Q15 6 30 10 Q45 14 60 10" fill="none" stroke="#BED0E0" stroke-width="0.8" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="#F5F2EB"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#grass)" opacity="0.5"/>

  <g stroke="#D4CCC0" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8">
    <path d="M0 540 L1920 540"/>
    <path d="M960 0 L960 1080"/>
    <path d="M400 300 L1520 300"/>
    <path d="M400 780 L1520 780"/>
  </g>

  <g filter="url(#sketch)" opacity="0.9">
    <rect x="200" y="180" width="160" height="200" rx="3" fill="#E8DDD0" stroke="#8B7D6B" stroke-width="2.5"/>
    <text x="280" y="290" text-anchor="middle" font-family="serif" font-size="18" fill="#6B5D4B">教学楼 A</text>

    <rect x="960" y="420" width="180" height="130" rx="3" fill="#E0D5C5" stroke="#8B7D6B" stroke-width="2.5"/>
    <text x="1050" y="492" text-anchor="middle" font-family="serif" font-size="20" fill="#6B5D4B">图书馆</text>

    <rect x="640" y="320" width="140" height="100" rx="3" fill="#E8DDD0" stroke="#8B7D6B" stroke-width="2.5"/>
    <text x="710" y="376" text-anchor="middle" font-family="serif" font-size="16" fill="#6B5D4B">学生食堂</text>

    <rect x="1400" y="200" width="120" height="180" rx="3" fill="#E0D5C5" stroke="#8B7D6B" stroke-width="2.5"/>
    <text x="1460" y="296" text-anchor="middle" font-family="serif" font-size="16" fill="#6B5D4B">宿舍 1 号</text>

    <rect x="1400" y="520" width="200" height="160" rx="3" fill="#E8DDD0" stroke="#8B7D6B" stroke-width="2.5"/>
    <text x="1500" y="608" text-anchor="middle" font-family="serif" font-size="18" fill="#6B5D4B">综合体育馆</text>

    <rect x="80" y="500" width="100" height="80" rx="3" fill="#E0D5C5" stroke="#8B7D6B" stroke-width="2.5"/>
    <text x="130" y="546" text-anchor="middle" font-family="serif" font-size="13" fill="#6B5D4B">校医院</text>

    <ellipse cx="500" cy="700" rx="120" ry="80" fill="none" stroke="#B8A890" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="500" y="706" text-anchor="middle" font-family="serif" font-size="14" fill="#9B8D7B">运动场</text>
  </g>

  <g fill="#A8C098" opacity="0.6">
    <circle cx="120" cy="120" r="18"/>
    <circle cx="1800" cy="150" r="22"/>
    <circle cx="1700" cy="900" r="20"/>
    <circle cx="200" cy="900" r="16"/>
    <circle cx="1000" cy="80" r="14"/>
  </g>

  <g transform="translate(80, 80)">
    <polygon points="0,35 8,0 16,35" fill="#8B7D6B"/>
    <polygon points="0,35 8,0 8,35" fill="#6B5D4B"/>
    <text x="8" y="50" text-anchor="middle" font-family="serif" font-size="12" fill="#6B5D4B">N</text>
  </g>

  <text x="960" y="1040" text-anchor="middle" font-family="serif" font-size="16" fill="#B8A890">
    ← 手绘地图占位图 · 正式版由①组绘制 →
  </text>
</svg>
